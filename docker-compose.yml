services:
  db:
    image: pgvector/pgvector:pg16
    container_name: scripture_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-scripture_bot}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-scripture_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: scripture_bot_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
